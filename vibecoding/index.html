<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🪵 合成凌肖</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    user-select: none;
    background: url('wallpaper.jpg') center center / cover no-repeat fixed;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(10, 0, 20, 0.45);
    z-index: 0;
  }

  /* ===== 启动页 ===== */
  #start-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(10, 0, 20, 0.75);
    cursor: pointer;
    transition: opacity 0.5s ease;
  }
  #start-screen h1 {
    font-size: 32px;
    color: #e8a0bf;
    text-shadow: 0 0 20px #e8a0bf;
    margin-bottom: 16px;
    letter-spacing: 4px;
  }
  #start-screen .start-hint {
    font-size: 15px;
    color: rgba(255,255,255,0.7);
    animation: blink 1.4s infinite;
  }
  #start-screen .start-icon {
    font-size: 64px;
    margin-bottom: 20px;
    animation: pulse 1.5s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  #start-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* ===== 桌面布局 ===== */
  #wrapper {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    padding: 20px;
    position: relative;
    z-index: 1;
  }
  #game-area { position: relative; }
  canvas { display: block; cursor: crosshair; border-radius: 0 0 12px 12px; touch-action: none; }
  .panel { display: flex; flex-direction: column; gap: 15px; width: 150px; padding-top: 10px; }
  .box {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(232,160,191,0.3);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
    color: white;
  }
  .box-label { font-size: 11px; color: #e8a0bf; letter-spacing: 1px; margin-bottom: 8px; }
  #score-val { font-size: 44px; font-weight: bold; }
  #next-img-wrap {
    width: 75px; height: 75px; border-radius: 50%;
    overflow: hidden; margin: 0 auto;
    border: 2px solid rgba(232,160,191,0.5);
  }
  #next-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .lvlist { display: flex; flex-direction: column; gap: 6px; text-align: left; }
  .lvitem { display: flex; align-items: center; gap: 8px; font-size: 11px; color: rgba(255,255,255,0.75); }
  .lvthumb { width: 22px; height: 22px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.25); }
  .lvthumb img { width: 100%; height: 100%; object-fit: cover; }

  /* ===== 手机顶栏 ===== */
  #mob-topbar {
    display: none;
    width: 100%;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    gap: 8px;
  }
  #mob-topbar .box {
    flex: 1;
    padding: 8px 10px;
  }
  #mob-score-val { font-size: 28px; font-weight: bold; }
  #mob-next-wrap {
    width: 48px; height: 48px; border-radius: 50%;
    overflow: hidden; margin: 0 auto;
    border: 2px solid rgba(232,160,191,0.5);
  }
  #mob-next-wrap img { width: 100%; height: 100%; object-fit: cover; }

  /* 手机图鉴按钮 */
  #lv-btn {
    display: none;
    position: fixed;
    top: 14px; left: 14px;
    z-index: 500;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(232,160,191,0.25);
    border: 1px solid rgba(232,160,191,0.5);
    cursor: pointer;
    overflow: hidden;
    padding: 0;
  }
  #lv-btn img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  /* 手机图鉴弹窗 */
  #lv-modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 800;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
  }
  #lv-modal.open { display: flex; }
  #lv-modal-inner {
    background: rgba(20,5,35,0.96);
    border: 1px solid rgba(232,160,191,0.4);
    border-radius: 16px;
    padding: 20px 24px;
    width: 85%;
    max-width: 320px;
    color: white;
  }
  #lv-modal-inner h3 {
    font-size: 14px;
    color: #e8a0bf;
    letter-spacing: 2px;
    margin-bottom: 14px;
    text-align: center;
  }
  #lv-modal-inner .lvlist { gap: 10px; }
  #lv-modal-inner .lvitem { font-size: 13px; }
  #lv-modal-inner .lvthumb { width: 32px; height: 32px; }
  #lv-close {
    display: block;
    margin: 18px auto 0;
    background: linear-gradient(135deg, #e8a0bf, #c050a0);
    color: white; border: none;
    padding: 10px 32px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
  }

  @media (max-width: 600px) {
    body { align-items: flex-start; overflow-y: auto; }
    #wrapper {
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 8px;
      width: 100%;
    }
    #panel-left, #panel-right { display: none; }
    #mob-topbar { display: flex; }
    #lv-btn { display: block; }
    canvas {
      width: 100% !important;
      height: auto !important;
      border-radius: 12px;
    }
  }

  /* ===== 游戏覆盖层 ===== */
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.82);
    display: none; flex-direction: column;
    justify-content: center; align-items: center;
    border-radius: 12px; color: white; z-index: 20;
  }
  #overlay h2 { font-size: 26px; color: #e8a0bf; margin-bottom: 8px; }
  #overlay .sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
  #overlay .fscore { font-size: 56px; font-weight: bold; margin-bottom: 25px; }
  #rbtn {
    background: linear-gradient(135deg, #e8a0bf, #c050a0);
    color: white; border: none; padding: 12px 36px;
    border-radius: 25px; font-size: 16px; cursor: pointer;
  }
  #rbtn:hover { filter: brightness(1.1); }
  #music-btn {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 999;
    background: rgba(232,160,191,0.25);
    border: 1px solid rgba(232,160,191,0.5);
    color: white; border-radius: 50%;
    width: 44px; height: 44px; font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  #music-btn:hover { background: rgba(232,160,191,0.45); }
  #quote-popup {
    position: absolute; pointer-events: none;
    font-size: 22px; font-weight: bold; color: #fff;
    text-shadow: 0 0 8px #e8a0bf, 0 0 18px #e8a0bf, 2px 2px 0 #a03070;
    white-space: nowrap; opacity: 0;
    transform: translateY(0px); transition: none;
    z-index: 10; border-radius: 8px; padding: 4px 10px;
  }
</style>
</head>
<body>

<!-- 启动页 -->
<div id="start-screen" onclick="handleStart()">
  <div class="start-icon">🪵</div>
  <h1>合成凌肖</h1>
  <div class="start-hint">点击任意位置开始 ✨</div>
</div>

<audio id="bgm" src="pump.mp3" loop preload="auto"></audio>
<button id="music-btn" title="音乐开关">🎵</button>

<!-- 手机图鉴按钮 -->
<button id="lv-btn" onclick="openLvModal()" title="等级图鉴">
  <img src="lx1.jpg" alt="图鉴">
</button>

<!-- 手机图鉴弹窗 -->
<div id="lv-modal" onclick="closeLvModal()">
  <div id="lv-modal-inner" onclick="event.stopPropagation()">
    <h3>✨ 等级图鉴 ✨</h3>
    <div class="lvlist" id="lvlist-modal"></div>
    <button id="lv-close" onclick="closeLvModal()">关闭</button>
  </div>
</div>

<div id="wrapper">
  <!-- 手机顶栏 -->
  <div id="mob-topbar">
    <div class="box">
      <div class="box-label">SCORE</div>
      <div id="mob-score-val">0</div>
    </div>
    <div class="box">
      <div class="box-label">NEXT</div>
      <div id="mob-next-wrap"><img id="mob-nimg" src="" alt="next"></div>
    </div>
  </div>

  <!-- 左侧图鉴（桌面） -->
  <div class="panel" id="panel-left">
    <div class="box">
      <div class="box-label">等级图鉴</div>
      <div class="lvlist" id="lvlist"></div>
    </div>
  </div>

  <!-- 游戏主区域 -->
  <div id="game-area">
    <canvas id="c" width="400" height="620"></canvas>
    <div id="quote-popup"></div>
    <div id="overlay">
      <h2>💔 凌肖太多了！</h2>
      <div class="sub">最终得分</div>
      <div class="fscore" id="fscore">0</div>
      <button id="rbtn" onclick="restart()">再来一次 🎮</button>
    </div>
  </div>

  <!-- 右侧面板（桌面） -->
  <div class="panel" id="panel-right">
    <div class="box">
      <div class="box-label">SCORE</div>
      <div id="score-val">0</div>
    </div>
    <div class="box">
      <div class="box-label">NEXT</div>
      <div id="next-img-wrap"><img id="nimg" src="" alt="next"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
const LV = [
  { r:22,  score:1,  img:'lx1.jpg', name:'小凌肖' },
  { r:30,  score:3,  img:'lx2.jpg', name:'蛋糕凌肖' },
  { r:38,  score:6,  img:'lx3.jpg', name:'毛绒凌肖' },
  { r:48,  score:10, img:'lx4.jpg', name:'海边凌肖' },
  { r:58,  score:15, img:'lx5.jpg', name:'西瓜凌肖' },
  { r:70,  score:21, img:'lx6.jpg', name:'学院凌肖' },
  { r:82,  score:28, img:'lx7.jpg', name:'严肃凌肖' },
  { r:96,  score:36, img:'lx8.jpg', name:'雪地凌肖✨' },
];

const QUOTES = ['快跑', '城管来了', '你也太菜了吧', '呦', '无聊'];
const W = 400, H = 620;
const DROP_Y = 60;
// ★ 死亡线放宽：只要球心还在这条线以下就不算死
const DANGER_Y = 55;

const IMGS = LV.map(l => { const i = new Image(); i.src = l.img; return i; });

// 生成桌面图鉴
const lvlistEl = document.getElementById('lvlist');
LV.forEach(l => {
  lvlistEl.innerHTML += `<div class="lvitem">
    <div class="lvthumb"><img src="${l.img}"></div>
    <span>${l.name}</span>
  </div>`;
});

// 生成手机弹窗图鉴
const lvlistModal = document.getElementById('lvlist-modal');
LV.forEach(l => {
  lvlistModal.innerHTML += `<div class="lvitem">
    <div class="lvthumb"><img src="${l.img}"></div>
    <span>${l.name}</span>
  </div>`;
});

function openLvModal() { document.getElementById('lv-modal').classList.add('open'); }
function closeLvModal() { document.getElementById('lv-modal').classList.remove('open'); }

// ===== Matter.js 初始化 =====
const { Engine, Render, Runner, Bodies, Body, World, Events, Vector } = Matter;
const engine = Engine.create({ gravity: { y: 1.5 } });
const world = engine.world;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// 墙壁
const wallOpts = { isStatic: true, restitution: 0.3, friction: 0.5 };
const ground = Bodies.rectangle(W/2, H + 25, W, 50, wallOpts);
const wallL  = Bodies.rectangle(-25, H/2, 50, H, wallOpts);
const wallR  = Bodies.rectangle(W+25, H/2, 50, H, wallOpts);
World.add(world, [ground, wallL, wallR]);

let circles = [];       // 所有已落地的球
let droppingBall = null; // 当前正在下落的球（不参与死亡判定）
let nextLv = randLv();
let score = 0;
let dead = false;
let gameStarted = false;
let mouseX = W / 2;
// 落地后的"冷却时间"：球落地后多少ms才开始参与死亡判定
const SETTLE_DELAY = 1200; // ms

// 音乐
const bgm = document.getElementById('bgm');
let musicOn = true;
document.getElementById('music-btn').onclick = () => {
  musicOn = !musicOn;
  if (musicOn) { bgm.play(); document.getElementById('music-btn').textContent = '🎵'; }
  else { bgm.pause(); document.getElementById('music-btn').textContent = '🔇'; }
};

function handleStart() {
  const ss = document.getElementById('start-screen');
  ss.classList.add('hidden');
  setTimeout(() => ss.style.display = 'none', 500);
  bgm.play().catch(() => {});
  gameStarted = true;
  spawnPreview();
}

function randLv() {
  // 只随机低等级球
  const max = Math.min(4, LV.length - 1);
  return Math.floor(Math.random() * max);
}

function updateUI() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('mob-score-val').textContent = score;
  const ni = document.getElementById('nimg');
  const mni = document.getElementById('mob-nimg');
  ni.src = LV[nextLv].img;
  mni.src = LV[nextLv].img;
}

// ===== 预览球（只是视觉，不进物理引擎）=====
let previewLv = 0;
function spawnPreview() {
  previewLv = nextLv;
  nextLv = randLv();
  updateUI();
}

// ===== 投放球 =====
function dropBall(x) {
  if (dead || !gameStarted) return;
  if (droppingBall) return; // 上一个球还没落定，不允许再投

  const lv = previewLv;
  const r  = LV[lv].r;
  x = Math.max(r + 5, Math.min(W - r - 5, x));

  const body = Bodies.circle(x, DROP_Y, r, {
    restitution: 0.3,
    friction: 0.6,
    frictionAir: 0.008,
    density: 0.002,
    label: 'ball'
  });
  body._lv = lv;
  body._merged = false;
  // ★ 记录"投放时间"，用于死亡判定冷却
  body._dropTime = Date.now();

  World.add(world, body);

  const ballObj = { body, lv, merging: false };
  circles.push(ballObj);
  droppingBall = ballObj;

  // 监听这个球"稳定落地"后解除 droppingBall 锁定
  // 策略：每隔100ms检查速度，速度够小就解锁，最多等3秒
  const lockStart = Date.now();
  const checkSettle = setInterval(() => {
    if (!droppingBall || droppingBall !== ballObj) {
      clearInterval(checkSettle);
      return;
    }
    const v = ballObj.body.velocity;
    const speed = Math.sqrt(v.x * v.x + v.y * v.y);
    const elapsed = Date.now() - lockStart;
    // 速度小于1，或者超过3秒强制解锁
    if (speed < 1.0 || elapsed > 3000) {
      droppingBall = null;
      clearInterval(checkSettle);
    }
  }, 100);

  spawnPreview();
}

// ===== 合并逻辑 =====
Events.on(engine, 'collisionStart', e => {
  e.pairs.forEach(pair => {
    const { bodyA, bodyB } = pair;
    if (bodyA.label !== 'ball' || bodyB.label !== 'ball') return;

    const lvA = bodyA._lv, lvB = bodyB._lv;
    if (lvA !== lvB) return;
    if (bodyA._merged || bodyB._merged) return;
    if (lvA >= LV.length - 1) return;

    bodyA._merged = true;
    bodyB._merged = true;

    const nx = (bodyA.position.x + bodyB.position.x) / 2;
    const ny = (bodyA.position.y + bodyB.position.y) / 2;
    const newLv = lvA + 1;

    World.remove(world, bodyA);
    World.remove(world, bodyB);
    circles = circles.filter(c => c.body !== bodyA && c.body !== bodyB);

    // 如果被合并的球是 droppingBall，解锁
    if (droppingBall && (droppingBall.body === bodyA || droppingBall.body === bodyB)) {
      droppingBall = null;
    }

    score += LV[newLv].score;
    updateUI();

    const nr = LV[newLv].r;
    const newBody = Bodies.circle(nx, ny, nr, {
      restitution: 0.35,
      friction: 0.5,
      frictionAir: 0.008,
      density: 0.002,
      label: 'ball'
    });
    newBody._lv = newLv;
    newBody._merged = false;
    newBody._dropTime = Date.now(); // 合并出来的球也有冷却
    World.add(world, newBody);
    circles.push({ body: newBody, lv: newLv, merging: false });

    showQuote(nx, ny);
  });
});

// ===== 语录弹出 =====
function showQuote(x, y) {
  const el = document.getElementById('quote-popup');
  el.textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  el.style.left = (x - 50) + 'px';
  el.style.top  = (y - 30) + 'px';
  el.style.opacity = '1';
  el.style.transition = 'none';
  el.style.transform = 'translateY(0px)';
  setTimeout(() => {
    el.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
    el.style.opacity = '0';
    el.style.transform = 'translateY(-40px)';
  }, 50);
}

// ===== 死亡判定（修复版）=====
function checkDead() {
  if (dead) return;
  const now = Date.now();
  for (const c of circles) {
    // ★ 跳过正在下落的球（droppingBall）
    if (c === droppingBall) continue;
    // ★ 跳过刚落地还在冷却期的球（SETTLE_DELAY ms内不判定）
    if (now - c.body._dropTime < SETTLE_DELAY) continue;

    const v = c.body.velocity;
    const speed = Math.sqrt(v.x * v.x + v.y * v.y);

    // ★ 只有静止（speed < 0.5）且球的顶部超过死亡线才算死
    if (speed < 0.5 && c.body.position.y - LV[c.lv].r < DANGER_Y) {
      dead = true;
      droppingBall = null;
      document.getElementById('fscore').textContent = score;
      document.getElementById('overlay').style.display = 'flex';
      bgm.pause();
      return;
    }
  }
}

// ===== 游戏循环 =====
function gameLoop() {
  Engine.update(engine, 1000 / 60);
  drawFrame();
  if (gameStarted && !dead) checkDead();
  requestAnimationFrame(gameLoop);
}

// ===== 绘制 =====
function drawFrame() {
  ctx.clearRect(0, 0, W, H);

  // 背景
  ctx.fillStyle = 'rgba(15, 5, 30, 0.55)';
  ctx.fillRect(0, 0, W, H);

  // 顶部区域（投放区）
  ctx.fillStyle = 'rgba(232,160,191,0.06)';
  ctx.fillRect(0, 0, W, DROP_Y + 5);

  // 死亡线
  ctx.save();
  ctx.strokeStyle = 'rgba(255, 80, 100, 0.55)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 5]);
  ctx.beginPath();
  ctx.moveTo(0, DANGER_Y);
  ctx.lineTo(W, DANGER_Y);
  ctx.stroke();
  ctx.restore();

  // 画预览球
  if (gameStarted && !dead) {
    const lv = previewLv;
    const r  = LV[lv].r;
    const px = Math.max(r + 5, Math.min(W - r - 5, mouseX));
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.beginPath();
    ctx.arc(px, DROP_Y, r, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(IMGS[lv], px - r, DROP_Y - r, r * 2, r * 2);
    ctx.restore();
    // 引导线
    ctx.save();
    ctx.strokeStyle = 'rgba(232,160,191,0.25)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.moveTo(px, DROP_Y + r);
    ctx.lineTo(px, H);
    ctx.stroke();
    ctx.restore();
  }

  // 画所有球
  for (const c of circles) {
    const { body, lv } = c;
    const { x, y } = body.position;
    const r = LV[lv].r;
    const angle = body.angle;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(IMGS[lv], -r, -r, r * 2, r * 2);
    ctx.restore();

    // 边框
    ctx.save();
    ctx.translate(x, y);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  }
}

// ===== 重新开始 =====
function restart() {
  circles.forEach(c => World.remove(world, c.body));
  circles = [];
  droppingBall = null;
  score = 0;
  dead = false;
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('score-val').textContent = '0';
  document.getElementById('mob-score-val').textContent = '0';
  spawnPreview();
  if (musicOn) bgm.play().catch(() => {});
}

// ===== 输入事件 =====
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  mouseX = (e.clientX - rect.left) * scaleX;
});

canvas.addEventListener('click', e => {
  if (!gameStarted || dead) return;
  if (droppingBall) return; // 锁定期不允许投
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  dropBall((e.clientX - rect.left) * scaleX);
});

// 触摸
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  mouseX = (e.touches[0].clientX - rect.left) * scaleX;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!gameStarted || dead) return;
  if (droppingBall) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const tx = (e.changedTouches[0].clientX - rect.left) * scaleX;
  dropBall(tx);
}, { passive: false });

// ===== 启动 =====
updateUI();
gameLoop();
</script>
</body>
</html>
