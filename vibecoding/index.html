<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🛹 合成小凌</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    user-select: none;
    background: url('wallpaper.jpg') center center / cover no-repeat fixed;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(10, 0, 20, 0.2);
    z-index: 0;
  }

  /* ===== 启动页 ===== */
  #start-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(10, 0, 20, 0.75);
    cursor: pointer;
    transition: opacity 0.5s ease;
  }
  #start-screen h1 {
    font-size: 32px;
    color: #e8a0bf;
    text-shadow: 0 0 20px #e8a0bf;
    margin-bottom: 16px;
    letter-spacing: 4px;
  }
  #start-screen .start-hint {
    font-size: 15px;
    color: rgba(255,255,255,0.7);
    animation: blink 1.4s infinite;
  }
  #start-screen .start-icon {
    font-size: 64px;
    margin-bottom: 20px;
    animation: pulse 1.5s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  #start-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* ===== 桌面布局 ===== */
  #wrapper {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    padding: 20px;
    position: relative;
    z-index: 1;
  }
  #game-area { position: relative; }

  /* ★ 关键：canvas 本身背景透明，才能透出壁纸 */
  canvas {
    display: block;
    cursor: crosshair;
    border-radius: 0 0 12px 12px;
    touch-action: none;
    background: transparent;
  }

  .panel { display: flex; flex-direction: column; gap: 15px; width: 150px; padding-top: 10px; }
  .box {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(232,160,191,0.3);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
    color: white;
  }
  .box-label { font-size: 11px; color: #e8a0bf; letter-spacing: 1px; margin-bottom: 8px; }
  #score-val { font-size: 44px; font-weight: bold; }
  #next-img-wrap {
    width: 75px; height: 75px; border-radius: 50%;
    overflow: hidden; margin: 0 auto;
    border: 2px solid rgba(232,160,191,0.5);
  }
  #next-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .lvlist { display: flex; flex-direction: column; gap: 6px; text-align: left; }
  .lvitem { display: flex; align-items: center; gap: 8px; font-size: 11px; color: rgba(255,255,255,0.75); }
  .lvthumb { width: 22px; height: 22px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.25); }
  .lvthumb img { width: 100%; height: 100%; object-fit: cover; }

  /* ===== 手机顶栏 ===== */
  #mob-topbar {
    display: none;
    width: 100%;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    gap: 8px;
  }
  #mob-topbar .box {
    flex: 1;
    padding: 8px 10px;
  }
  #mob-score-val { font-size: 28px; font-weight: bold; }
  #mob-next-wrap {
    width: 48px; height: 48px; border-radius: 50%;
    overflow: hidden; margin: 0 auto;
    border: 2px solid rgba(232,160,191,0.5);
  }
  #mob-next-wrap img { width: 100%; height: 100%; object-fit: cover; }

  /* 手机图鉴按钮 */
  #lv-btn {
    display: none;
    position: fixed;
    top: 14px; left: 14px;
    z-index: 500;
    height: 40px;
    padding: 0 14px;
    border-radius: 20px;
    background: rgba(232,160,191,0.25);
    border: 1px solid rgba(232,160,191,0.6);
    cursor: pointer;
    align-items: center;
    gap: 8px;
    color: white;
    font-size: 13px;
  }
  #lv-btn .list-icon {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #lv-btn .list-icon span {
    display: block;
    width: 18px;
    height: 2px;
    background: #e8a0bf;
    border-radius: 2px;
  }
  #lv-btn .list-label {
    color: #e8a0bf;
    font-size: 13px;
    letter-spacing: 1px;
  }

  /* 手机图鉴弹窗 */
  #lv-modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 800;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
  }
  #lv-modal.open { display: flex; }
  #lv-modal-inner {
    background: rgba(20,5,35,0.96);
    border: 1px solid rgba(232,160,191,0.4);
    border-radius: 16px;
    padding: 20px 24px;
    width: 85%;
    max-width: 320px;
    color: white;
  }
  #lv-modal-inner h3 {
    font-size: 14px;
    color: #e8a0bf;
    letter-spacing: 2px;
    margin-bottom: 14px;
    text-align: center;
  }
  #lv-modal-inner .lvlist { gap: 10px; }
  #lv-modal-inner .lvitem { font-size: 13px; }
  #lv-modal-inner .lvthumb { width: 32px; height: 32px; }
  #lv-close {
    display: block;
    margin: 18px auto 0;
    background: linear-gradient(135deg, #e8a0bf, #c050a0);
    color: white; border: none;
    padding: 10px 32px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
  }

  @media (max-width: 600px) {
    body { align-items: flex-start; overflow-y: auto; }
    #wrapper {
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 8px;
      width: 100%;
    }
    #panel-left, #panel-right { display: none; }
    #mob-topbar { display: flex; }
    #lv-btn { display: flex; }
  }

  /* ===== 游戏覆盖层 ===== */
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.82);
    display: none; flex-direction: column;
    justify-content: center; align-items: center;
    border-radius: 12px; color: white; z-index: 20;
  }
  #overlay h2 { font-size: 26px; color: #e8a0bf; margin-bottom: 8px; }
  #overlay .sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
  #overlay .fscore { font-size: 56px; font-weight: bold; margin-bottom: 25px; }
  #rbtn {
    background: linear-gradient(135deg, #e8a0bf, #c050a0);
    color: white; border: none; padding: 12px 36px;
    border-radius: 25px; font-size: 16px; cursor: pointer;
  }
  #rbtn:hover { filter: brightness(1.1); }
  #music-btn {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 999;
    background: rgba(232,160,191,0.25);
    border: 1px solid rgba(232,160,191,0.5);
    color: white; border-radius: 50%;
    width: 44px; height: 44px; font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  #music-btn:hover { background: rgba(232,160,191,0.45); }
  #quote-popup {
    position: absolute; pointer-events: none;
    font-size: 22px; font-weight: bold; color: #fff;
    text-shadow: 0 0 8px #e8a0bf, 0 0 18px #e8a0bf, 2px 2px 0 #a03070;
    white-space: nowrap; opacity: 0;
    transform: translateY(0px); transition: none;
    z-index: 10; border-radius: 8px; padding: 4px 10px;
  }
</style>
</head>
<body>

<!-- 启动页 -->
<div id="start-screen" onclick="handleStart()">
  <div class="start-icon">🛹</div>
  <h1>合成小凌</h1>
  <div class="start-hint">点击任意位置开始 ✨</div>
</div>

<audio id="bgm" src="pump.mp3" loop preload="auto"></audio>
<button id="music-btn" title="音乐开关">🎵</button>

<!-- 手机图鉴按钮 -->
<button id="lv-btn" onclick="openLvModal()" title="等级图鉴">
  <span class="list-icon">
    <span></span>
    <span></span>
    <span></span>
  </span>
  <span class="list-label">图鉴</span>
</button>

<!-- 手机图鉴弹窗 -->
<div id="lv-modal" onclick="closeLvModal()">
  <div id="lv-modal-inner" onclick="event.stopPropagation()">
    <h3>✨ 等级图鉴 ✨</h3>
    <div class="lvlist" id="lvlist-modal"></div>
    <button id="lv-close" onclick="closeLvModal()">关闭</button>
  </div>
</div>

<div id="wrapper">
  <!-- 手机顶栏 -->
  <div id="mob-topbar">
    <div class="box">
      <div class="box-label">SCORE</div>
      <div id="mob-score-val">0</div>
    </div>
    <div class="box">
      <div class="box-label">NEXT</div>
      <div id="mob-next-wrap"><img id="mob-nimg" src="" alt="next"></div>
    </div>
  </div>

  <!-- 左侧图鉴（桌面） -->
  <div class="panel" id="panel-left">
    <div class="box">
      <div class="box-label">等级图鉴</div>
      <div class="lvlist" id="lvlist"></div>
    </div>
  </div>

  <!-- 游戏主区域 -->
  <div id="game-area">
    <canvas id="c" width="400" height="620"></canvas>
    <div id="quote-popup"></div>
    <div id="overlay">
      <h2>💔 小凌太多了！</h2>
      <div class="sub">最终得分</div>
      <div class="fscore" id="fscore">0</div>
      <button id="rbtn" onclick="restart()">再来一次 🎮</button>
    </div>
  </div>

  <!-- 右侧面板（桌面） -->
  <div class="panel" id="panel-right">
    <div class="box">
      <div class="box-label">SCORE</div>
      <div id="score-val">0</div>
    </div>
    <div class="box">
      <div class="box-label">NEXT</div>
      <div id="next-img-wrap"><img id="nimg" src="" alt="next"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
const LV = [
  { r:22,  score:1,  img:'lx1.jpg', name:'小凌肖' },
  { r:30,  score:3,  img:'lx2.jpg', name:'蛋糕凌肖' },
  { r:38,  score:6,  img:'lx3.jpg', name:'毛绒凌肖' },
  { r:48,  score:10, img:'lx4.jpg', name:'海边凌肖' },
  { r:58,  score:15, img:'lx5.jpg', name:'西瓜凌肖' },
  { r:70,  score:21, img:'lx6.jpg', name:'学院凌肖' },
  { r:82,  score:28, img:'lx7.jpg', name:'严肃凌肖' },
  { r:96,  score:36, img:'lx8.jpg', name:'雪地凌肖✨' },
];

const QUOTES = ['快跑', '城管来了', '你也太菜了吧', '呦', '无聊'];
const W = 400, H = 620;
const DROP_Y = 60;
const DANGER_Y = 55;

const IMGS = LV.map(l => { const i = new Image(); i.src = l.img; return i; });

// 生成桌面图鉴
const lvlistEl = document.getElementById('lvlist');
LV.forEach(l => {
  const div = document.createElement('div');
  div.className = 'lvitem';
  div.innerHTML = `<div class="lvthumb"><img src="${l.img}"></div><span>${l.name}</span>`;
  lvlistEl.appendChild(div);
});

// 生成手机图鉴弹窗
const lvlistModal = document.getElementById('lvlist-modal');
LV.forEach(l => {
  const div = document.createElement('div');
  div.className = 'lvitem';
  div.innerHTML = `<div class="lvthumb"><img src="${l.img}"></div><span>${l.name}</span>`;
  lvlistModal.appendChild(div);
});

function openLvModal() { document.getElementById('lv-modal').classList.add('open'); }
function closeLvModal() { document.getElementById('lv-modal').classList.remove('open'); }

// Matter.js 初始化
const { Engine, Render, Runner, Bodies, Body, World, Events, Query } = Matter;
const engine = Engine.create();
const world = engine.world;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// 边界墙
const wallOpts = { isStatic: true, restitution: 0.3, friction: 0.5 };
const ground = Bodies.rectangle(W/2, H+25, W, 50, wallOpts);
const wallL  = Bodies.rectangle(-25, H/2, 50, H, wallOpts);
const wallR  = Bodies.rectangle(W+25, H/2, 50, H, wallOpts);
World.add(world, [ground, wallL, wallR]);

let score = 0;
let nextLv = randLv();
let dropX = W / 2;
let canDrop = true;
let gameOver = false;
let dangerTimer = 0;
let bgmStarted = false;

function randLv() { return Math.floor(Math.random() * 4); }

function updateScoreUI() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('mob-score-val').textContent = score;
}
function updateNextUI() {
  document.getElementById('nimg').src = LV[nextLv].img;
  document.getElementById('mob-nimg').src = LV[nextLv].img;
}
updateNextUI();

const ballData = new Map();

function dropBall(x) {
  if (!canDrop || gameOver) return;
  const lv = nextLv;
  const r = LV[lv].r;
  const ball = Bodies.circle(x, DROP_Y, r, {
    restitution: 0.3,
    friction: 0.5,
    frictionAir: 0.01,
    label: 'ball'
  });
  ball.gameData = { lv, merging: false };
  World.add(world, ball);
  ballData.set(ball.id, { lv, merging: false });

  nextLv = randLv();
  updateNextUI();
  canDrop = false;
  setTimeout(() => { if (!gameOver) canDrop = true; }, 500);

  if (Math.random() < 0.3) showQuote(x, DROP_Y);
}

function showQuote(x, y) {
  const el = document.getElementById('quote-popup');
  el.textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  el.style.left = (x - 40) + 'px';
  el.style.top = (y - 10) + 'px';
  el.style.opacity = '1';
  el.style.transform = 'translateY(0)';
  el.style.transition = 'none';
  setTimeout(() => {
    el.style.transition = 'opacity 0.8s, transform 0.8s';
    el.style.opacity = '0';
    el.style.transform = 'translateY(-40px)';
  }, 50);
}

// 合并检测
Events.on(engine, 'collisionStart', e => {
  e.pairs.forEach(pair => {
    const a = pair.bodyA, b = pair.bodyB;
    if (!a.gameData || !b.gameData) return;
    if (a.gameData.lv !== b.gameData.lv) return;
    if (a.gameData.merging || b.gameData.merging) return;
    const lv = a.gameData.lv;
    if (lv >= LV.length - 1) return;

    a.gameData.merging = true;
    b.gameData.merging = true;

    const mx = (a.position.x + b.position.x) / 2;
    const my = (a.position.y + b.position.y) / 2;

    setTimeout(() => {
      World.remove(world, a);
      World.remove(world, b);
      ballData.delete(a.id);
      ballData.delete(b.id);

      const newLv = lv + 1;
      const r = LV[newLv].r;
      const ball = Bodies.circle(mx, my, r, {
        restitution: 0.3,
        friction: 0.5,
        frictionAir: 0.01,
        label: 'ball'
      });
      ball.gameData = { lv: newLv, merging: false };
      World.add(world, ball);
      ballData.set(ball.id, { lv: newLv, merging: false });

      score += LV[newLv].score;
      updateScoreUI();
    }, 50);
  });
});

// 游戏结束检测
function checkDanger() {
  if (gameOver) return;
  const bodies = engine.world.bodies.filter(b => b.label === 'ball' && !b.gameData?.merging);
  const danger = bodies.some(b => b.position.y - b.circleRadius < DANGER_Y);
  if (danger) {
    dangerTimer++;
    if (dangerTimer > 120) triggerGameOver();
  } else {
    dangerTimer = 0;
  }
}

function triggerGameOver() {
  gameOver = true;
  document.getElementById('fscore').textContent = score;
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
}

function restart() {
  const bodies = engine.world.bodies.filter(b => b.label === 'ball');
  bodies.forEach(b => World.remove(world, b));
  ballData.clear();
  score = 0;
  updateScoreUI();
  nextLv = randLv();
  updateNextUI();
  canDrop = true;
  gameOver = false;
  dangerTimer = 0;
  dropX = W / 2;
  document.getElementById('overlay').style.display = 'none';
}

// 渲染循环
function gameLoop() {
  Engine.update(engine, 1000 / 60);
  checkDanger();

  // ★ 先清空画布（让壁纸透出来），再用 40% 不透明度的深色覆盖
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(15, 5, 30, 0.4)';
  ctx.fillRect(0, 0, W, H);

  // 画顶部提示线
  ctx.strokeStyle = 'rgba(232,160,191,0.3)';
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(0, DROP_Y);
  ctx.lineTo(W, DROP_Y);
  ctx.stroke();
  ctx.setLineDash([]);

  // 画准星
  if (!gameOver && canDrop) {
    ctx.strokeStyle = 'rgba(232,160,191,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(dropX, 10);
    ctx.lineTo(dropX, DROP_Y - LV[nextLv].r);
    ctx.stroke();

    // 预览球
    const r = LV[nextLv].r;
    ctx.save();
    ctx.beginPath();
    ctx.arc(dropX, DROP_Y - r, r, 0, Math.PI * 2);
    ctx.clip();
    ctx.globalAlpha = 0.5;
    ctx.drawImage(IMGS[nextLv], dropX - r, DROP_Y - r * 2, r * 2, r * 2);
    ctx.restore();
  }

  // 画所有球
  engine.world.bodies.forEach(b => {
    if (b.label !== 'ball') return;
    const lv = b.gameData?.lv ?? 0;
    const r = b.circleRadius;
    const x = b.position.x, y = b.position.y;

    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(IMGS[lv], x - r, y - r, r * 2, r * 2);
    ctx.restore();

    // 描边
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });

  requestAnimationFrame(gameLoop);
}

// 输入控制
canvas.addEventListener('mousemove', e => {
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  dropX = Math.max(LV[nextLv].r, Math.min(W - LV[nextLv].r, (e.clientX - rect.left) * scaleX));
});
canvas.addEventListener('click', e => {
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  dropX = Math.max(LV[nextLv].r, Math.min(W - LV[nextLv].r, (e.clientX - rect.left) * scaleX));
  dropBall(dropX);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  dropX = Math.max(LV[nextLv].r, Math.min(W - LV[nextLv].r, (e.touches[0].clientX - rect.left) * scaleX));
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (gameOver) return;
  dropBall(dropX);
}, { passive: false });

// 启动页
function handleStart() {
  const ss = document.getElementById('start-screen');
  ss.classList.add('hidden');
  const bgm = document.getElementById('bgm');
  bgm.play().catch(() => {});
  bgmStarted = true;
  setTimeout(() => ss.style.display = 'none', 500);
}

// 音乐按钮
const musicBtn = document.getElementById('music-btn');
let musicOn = true;
musicBtn.addEventListener('click', () => {
  const bgm = document.getElementById('bgm');
  if (musicOn) { bgm.pause(); musicBtn.textContent = '🔇'; }
  else { bgm.play(); musicBtn.textContent = '🎵'; }
  musicOn = !musicOn;
});

gameLoop();
</script>
</body>
</html>
