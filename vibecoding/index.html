<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🪵 合成凌肖</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    user-select: none;
    background: url('wallpaper.jpg') center center / cover no-repeat fixed;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(10, 0, 20, 0.45);
    z-index: 0;
  }

  /* ===== 点击进入启动页 ===== */
  #start-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(10, 0, 20, 0.75);
    cursor: pointer;
    transition: opacity 0.5s ease;
  }
  #start-screen h1 {
    font-size: 32px;
    color: #e8a0bf;
    text-shadow: 0 0 20px #e8a0bf;
    margin-bottom: 16px;
    letter-spacing: 4px;
  }
  #start-screen .start-hint {
    font-size: 15px;
    color: rgba(255,255,255,0.7);
    animation: blink 1.4s infinite;
  }
  #start-screen .start-icon {
    font-size: 64px;
    margin-bottom: 20px;
    animation: pulse 1.5s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  #start-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* ===== 桌面布局 ===== */
  #wrapper {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    padding: 20px;
    position: relative;
    z-index: 1;
  }
  #game-area { position: relative; }
  canvas { display: block; cursor: crosshair; border-radius: 0 0 12px 12px; touch-action: none; }
  .panel { display: flex; flex-direction: column; gap: 15px; width: 150px; padding-top: 10px; }
  .box {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(232,160,191,0.3);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
    color: white;
  }
  .box-label { font-size: 11px; color: #e8a0bf; letter-spacing: 1px; margin-bottom: 8px; }
  #score-val { font-size: 44px; font-weight: bold; }
  #next-img-wrap {
    width: 75px; height: 75px; border-radius: 50%;
    overflow: hidden; margin: 0 auto;
    border: 2px solid rgba(232,160,191,0.5);
  }
  #next-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .lvlist { display: flex; flex-direction: column; gap: 6px; text-align: left; }
  .lvitem { display: flex; align-items: center; gap: 8px; font-size: 11px; color: rgba(255,255,255,0.75); }
  .lvthumb { width: 22px; height: 22px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.25); }
  .lvthumb img { width: 100%; height: 100%; object-fit: cover; }

  /* ===== 手机专属 ===== */
  #mob-topbar {
    display: none;
    width: 100%;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    gap: 8px;
  }
  #mob-topbar .box {
    flex: 1;
    padding: 8px 10px;
  }
  #mob-score-val { font-size: 28px; font-weight: bold; }
  #mob-next-wrap {
    width: 48px; height: 48px; border-radius: 50%;
    overflow: hidden; margin: 0 auto;
    border: 2px solid rgba(232,160,191,0.5);
  }
  #mob-next-wrap img { width: 100%; height: 100%; object-fit: cover; }

  /* 手机图鉴按钮 */
  #lv-btn {
    display: none;
    position: fixed;
    top: 14px; left: 14px;
    z-index: 500;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(232,160,191,0.25);
    border: 1px solid rgba(232,160,191,0.5);
    cursor: pointer;
    overflow: hidden;
    padding: 0;
  }
  #lv-btn img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  /* 手机图鉴弹窗 */
  #lv-modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 800;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
  }
  #lv-modal.open { display: flex; }
  #lv-modal-inner {
    background: rgba(20,5,35,0.96);
    border: 1px solid rgba(232,160,191,0.4);
    border-radius: 16px;
    padding: 20px 24px;
    width: 85%;
    max-width: 320px;
    color: white;
  }
  #lv-modal-inner h3 {
    font-size: 14px;
    color: #e8a0bf;
    letter-spacing: 2px;
    margin-bottom: 14px;
    text-align: center;
  }
  #lv-modal-inner .lvlist { gap: 10px; }
  #lv-modal-inner .lvitem { font-size: 13px; }
  #lv-modal-inner .lvthumb { width: 32px; height: 32px; }
  #lv-close {
    display: block;
    margin: 18px auto 0;
    background: linear-gradient(135deg, #e8a0bf, #c050a0);
    color: white; border: none;
    padding: 10px 32px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
  }

  @media (max-width: 600px) {
    body { align-items: flex-start; overflow-y: auto; }
    #wrapper {
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 8px;
      width: 100%;
    }
    #panel-left, #panel-right { display: none; }
    #mob-topbar { display: flex; }
    #lv-btn { display: block; }
    canvas {
      width: 100% !important;
      height: auto !important;
      border-radius: 12px;
    }
  }

  /* ===== 游戏覆盖层 ===== */
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.82);
    display: none; flex-direction: column;
    justify-content: center; align-items: center;
    border-radius: 12px; color: white; z-index: 20;
  }
  #overlay h2 { font-size: 26px; color: #e8a0bf; margin-bottom: 8px; }
  #overlay .sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
  #overlay .fscore { font-size: 56px; font-weight: bold; margin-bottom: 25px; }
  #rbtn {
    background: linear-gradient(135deg, #e8a0bf, #c050a0);
    color: white; border: none; padding: 12px 36px;
    border-radius: 25px; font-size: 16px; cursor: pointer;
  }
  #rbtn:hover { filter: brightness(1.1); }
  #music-btn {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 999;
    background: rgba(232,160,191,0.25);
    border: 1px solid rgba(232,160,191,0.5);
    color: white; border-radius: 50%;
    width: 44px; height: 44px; font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  #music-btn:hover { background: rgba(232,160,191,0.45); }
  #quote-popup {
    position: absolute; pointer-events: none;
    font-size: 22px; font-weight: bold; color: #fff;
    text-shadow: 0 0 8px #e8a0bf, 0 0 18px #e8a0bf, 2px 2px 0 #a03070;
    white-space: nowrap; opacity: 0;
    transform: translateY(0px); transition: none;
    z-index: 10; border-radius: 8px; padding: 4px 10px;
  }
</style>
</head>
<body>

<!-- 点击进入启动页 -->
<div id="start-screen" onclick="handleStart()">
  <div class="start-icon">🪵</div>
  <h1>合成凌肖</h1>
  <div class="start-hint">点击任意位置开始 ✨</div>
</div>

<audio id="bgm" src="pump.mp3" loop preload="auto"></audio>
<button id="music-btn" title="音乐开关">🎵</button>

<!-- 手机图鉴按钮 -->
<button id="lv-btn" onclick="openLvModal()" title="等级图鉴">
  <img src="lx1.jpg" alt="图鉴">
</button>

<!-- 手机图鉴弹窗 -->
<div id="lv-modal" onclick="closeLvModal()">
  <div id="lv-modal-inner" onclick="event.stopPropagation()">
    <h3>✨ 等级图鉴 ✨</h3>
    <div class="lvlist" id="lvlist-modal"></div>
    <button id="lv-close" onclick="closeLvModal()">关闭</button>
  </div>
</div>

<div id="wrapper">
  <!-- 手机顶栏 -->
  <div id="mob-topbar">
    <div class="box">
      <div class="box-label">SCORE</div>
      <div id="mob-score-val">0</div>
    </div>
    <div class="box">
      <div class="box-label">NEXT</div>
      <div id="mob-next-wrap"><img id="mob-nimg" src="" alt="next"></div>
    </div>
  </div>

  <!-- 左侧图鉴（桌面） -->
  <div class="panel" id="panel-left">
    <div class="box">
      <div class="box-label">等级图鉴</div>
      <div class="lvlist" id="lvlist"></div>
    </div>
  </div>

  <!-- 游戏主区域 -->
  <div id="game-area">
    <canvas id="c" width="400" height="620"></canvas>
    <div id="quote-popup"></div>
    <div id="overlay">
      <h2>💔 凌肖太多了！</h2>
      <div class="sub">最终得分</div>
      <div class="fscore" id="fscore">0</div>
      <button id="rbtn" onclick="restart()">再来一次 🎮</button>
    </div>
  </div>

  <!-- 右侧面板（桌面） -->
  <div class="panel" id="panel-right">
    <div class="box">
      <div class="box-label">SCORE</div>
      <div id="score-val">0</div>
    </div>
    <div class="box">
      <div class="box-label">NEXT</div>
      <div id="next-img-wrap"><img id="nimg" src="" alt="next"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
const LV = [
  { r:22,  score:1,  img:'lx1.jpg', name:'小凌肖' },
  { r:30,  score:3,  img:'lx2.jpg', name:'蛋糕凌肖' },
  { r:38,  score:6,  img:'lx3.jpg', name:'毛绒凌肖' },
  { r:48,  score:10, img:'lx4.jpg', name:'海边凌肖' },
  { r:58,  score:15, img:'lx5.jpg', name:'西瓜凌肖' },
  { r:70,  score:21, img:'lx6.jpg', name:'学院凌肖' },
  { r:82,  score:28, img:'lx7.jpg', name:'严肃凌肖' },
  { r:96,  score:36, img:'lx8.jpg', name:'雪地凌肖✨' },
];

const QUOTES = ['快跑', '城管来了', '你也太菜了吧', '呦', '无聊'];
const W = 400, H = 620;
const DROP_Y = 68;
const DANGER_Y = 85;

const IMGS = LV.map(l => { const i = new Image(); i.src = l.img; return i; });

// 生成桌面图鉴
const lvlist = document.getElementById('lvlist');
LV.forEach((l) => {
  lvlist.innerHTML += `<div class="lvitem">
    <div class="lvthumb"><img src="${l.img}"></div>
    <span>${l.name}</span>
  </div>`;
});

// 生成手机弹窗图鉴
const lvlistModal = document.getElementById('lvlist-modal');
LV.forEach((l) => {
  lvlistModal.innerHTML += `<div class="lvitem">
    <div class="lvthumb"><img src="${l.img}"></div>
    <span>${l.name}</span>
  </div>`;
});

function openLvModal() { document.getElementById('lv-modal').classList.add('open'); }
function closeLvModal() { document.getElementById('lv-modal').classList.remove('open'); }

// ===== 启动页处理 =====
const bgm = document.getElementById('bgm');
const musicBtn = document.getElementById('music-btn');
let musicOn = false;

function handleStart() {
  const ss = document.getElementById('start-screen');
  ss.classList.add('hidden');
  setTimeout(() => { ss.style.display = 'none'; }, 500);
  bgm.play().then(() => {
    musicOn = true;
    musicBtn.textContent = '🎵';
  }).catch(() => {});
}

// 音乐开关按钮
musicBtn.addEventListener('click', () => {
  if (musicOn) {
    bgm.pause();
    musicBtn.textContent = '🔇';
    musicOn = false;
  } else {
    bgm.play().catch(() => {});
    musicBtn.textContent = '🎵';
    musicOn = true;
  }
});

// 同步更新分数和NEXT（桌面+手机）
function updateScore(val) {
  document.getElementById('score-val').textContent = val;
  document.getElementById('mob-score-val').textContent = val;
}
function updateNext(src) {
  document.getElementById('nimg').src = src;
  document.getElementById('mob-nimg').src = src;
}

// 台词弹出
const quotePopup = document.getElementById('quote-popup');
let quoteTimer = null;

function showQuote(x, y) {
  const text = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  quotePopup.textContent = text;
  quotePopup.style.transition = 'none';
  quotePopup.style.opacity = '1';
  quotePopup.style.transform = 'translateY(0px)';
  const pw = quotePopup.offsetWidth || 120;
  const ph = quotePopup.offsetHeight || 36;
  quotePopup.style.left = Math.max(0, Math.min(W - pw, x - pw / 2)) + 'px';
  quotePopup.style.top  = Math.max(0, y - ph - 10) + 'px';
  if (quoteTimer) clearTimeout(quoteTimer);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      quotePopup.style.transition = 'opacity 0.9s ease, transform 0.9s ease';
      quotePopup.style.opacity = '0';
      quotePopup.style.transform = 'translateY(-40px)';
    });
  });
  quoteTimer = setTimeout(() => {
    quotePopup.style.transition = 'none';
    quotePopup.style.opacity = '0';
  }, 1000);
}

// 物理引擎
const { Engine, Bodies, Body, World, Events } = Matter;
let engine, world;
let circles = [], merging = new Set(), pendingMerges = [];
let score = 0, curLv, nxtLv, dropX = W/2;
let canDrop = true, dead = false, goTimer = 0;

function initPhysics() {
  engine = Engine.create({ gravity: { y: 2 } });
  world = engine.world;
  const T = 20;
  World.add(world, [
    Bodies.rectangle(W/2, H+T/2, W+T*2, T, { isStatic:true }),
    Bodies.rectangle(-T/2, H/2, T, H*3, { isStatic:true }),
    Bodies.rectangle(W+T/2, H/2, T, H*3, { isStatic:true }),
  ]);
  Events.on(engine, 'collisionStart', e => {
    if (dead) return;
    e.pairs.forEach(p => {
      const a = circles.find(c => c.body === p.bodyA);
      const b = circles.find(c => c.body === p.bodyB);
      if (!a || !b) return;
      if (a.lv !== b.lv || a.lv >= LV.length-1) return;
      if (merging.has(a) || merging.has(b)) return;
      merging.add(a); merging.add(b);
      pendingMerges.push([a, b]);
    });
  });
}

function processMerges() {
  if (!pendingMerges.length) return;
  pendingMerges.forEach(([a, b]) => {
    if (!circles.includes(a) || !circles.includes(b)) return;
    const nl = a.lv + 1;
    const mx = (a.body.position.x + b.body.position.x) / 2;
    const my = (a.body.position.y + b.body.position.y) / 2;
    removeC(a); removeC(b);
    const nc = addC(mx, my, nl);
    Body.setVelocity(nc.body, { x: 0, y: -3 });
    score += LV[nl].score;
    updateScore(score);
    showQuote(mx, my);
  });
  pendingMerges = []; merging.clear();
}

function addC(x, y, lv) {
  const body = Bodies.circle(x, y, LV[lv].r, {
    restitution: 0.25, friction: 0.5, frictionAir: 0.01, density: 0.002,
  });
  World.add(world, body);
  const c = { body, lv };
  circles.push(c);
  return c;
}

function removeC(c) {
  World.remove(world, c.body);
  const i = circles.indexOf(c);
  if (i !== -1) circles.splice(i, 1);
  merging.delete(c);
}

function drop() {
  if (!canDrop || dead) return;
  canDrop = false;
  addC(dropX, DROP_Y, curLv);
  curLv = nxtLv;
  nxtLv = randLv();
  updateNext(LV[nxtLv].img);
  setTimeout(() => { if (!dead) canDrop = true; }, 700);
}

function randLv() { return Math.floor(Math.random() * 4); }

function checkDead() {
  for (const c of circles) {
    const spd = Math.sqrt(c.body.velocity.x**2 + c.body.velocity.y**2);
    if (c.body.position.y - LV[c.lv].r < DANGER_Y && spd < 0.8) {
      dead = true; canDrop = false;
      document.getElementById('fscore').textContent = score;
      document.getElementById('overlay').style.display = 'flex';
      return;
    }
  }
}

function restart() {
  circles.forEach(c => World.remove(world, c.body));
  circles = []; merging.clear(); pendingMerges = [];
  score = 0; dead = false; canDrop = true; dropX = W/2; goTimer = 0;
  updateScore(0);
  document.getElementById('overlay').style.display = 'none';
  curLv = randLv(); nxtLv = randLv();
  updateNext(LV[nxtLv].img);
}

// 渲染
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// 获取canvas缩放比（手机适配）
function getScale() {
  return canvas.getBoundingClientRect().width / W;
}

function drawDropLine() {
  ctx.save();
  ctx.setLineDash([6, 5]);
  ctx.strokeStyle = 'rgba(232,160,191,0.35)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(dropX, DROP_Y);
  ctx.lineTo(dropX, H);
  ctx.stroke();
  ctx.restore();
}

function drawPreview() {
  if (!canDrop || dead) return;
  const r = LV[curLv].r;
  const img = IMGS[curLv];
  ctx.save();
  ctx.globalAlpha = 0.75;
  ctx.beginPath();
  ctx.arc(dropX, DROP_Y, r, 0, Math.PI*2);
  ctx.clip();
  ctx.drawImage(img, dropX-r, DROP_Y-r, r*2, r*2);
  ctx.restore();
  ctx.save();
  ctx.beginPath();
  ctx.arc(dropX, DROP_Y, r, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
}

function drawTopBar() {
  ctx.save();
  ctx.fillStyle = 'rgba(232,160,191,0.12)';
  ctx.beginPath();
  ctx.roundRect(0, 0, W, DROP_Y - 4, [12, 12, 0, 0]);
  ctx.fill();
  ctx.strokeStyle = 'rgba(232,160,191,0.25)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
  ctx.save();
  ctx.strokeStyle = 'rgba(232,160,191,0.5)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(0, DANGER_Y);
  ctx.lineTo(W, DANGER_Y);
  ctx.stroke();
  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawTopBar();
  drawDropLine();
  for (const c of circles) {
    const { x, y } = c.body.position;
    const r = LV[c.lv].r;
    const img = IMGS[c.lv];
    const angle = c.body.angle;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.clip();
    ctx.drawImage(img, -r, -r, r*2, r*2);
    ctx.restore();
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }
  drawPreview();
}

// 事件处理（鼠标+触摸，支持缩放）
function getCanvasX(clientX) {
  const rect = canvas.getBoundingClientRect();
  const scale = W / rect.width;
  return (clientX - rect.left) * scale;
}

canvas.addEventListener('mousemove', e => {
  if (dead) return;
  dropX = Math.max(LV[curLv].r, Math.min(W - LV[curLv].r, getCanvasX(e.clientX)));
});

canvas.addEventListener('click', e => {
  if (dead) return;
  dropX = Math.max(LV[curLv].r, Math.min(W - LV[curLv].r, getCanvasX(e.clientX)));
  drop();
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (dead) return;
  const t = e.touches[0];
  dropX = Math.max(LV[curLv].r, Math.min(W - LV[curLv].r, getCanvasX(t.clientX)));
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (dead) return;
  const t = e.changedTouches[0];
  dropX = Math.max(LV[curLv].r, Math.min(W - LV[curLv].r, getCanvasX(t.clientX)));
  drop();
}, { passive: false });

// 主循环
let lastTime = 0;
function loop(ts) {
  const dt = Math.min(ts - lastTime, 32);
  lastTime = ts;
  Engine.update(engine, dt);
  processMerges();
  goTimer += dt;
  if (goTimer > 2000) checkDead();
  render();
  requestAnimationFrame(loop);
}

// 初始化
initPhysics();
curLv = randLv(); nxtLv = randLv();
updateNext(LV[nxtLv].img);
requestAnimationFrame(loop);
</script>
</body>
</html>
