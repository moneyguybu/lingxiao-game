<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🪵 合成凌肖</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    user-select: none;
    background: url('wallpaper.jpg') center center / cover no-repeat fixed;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(10, 0, 20, 0.45);
    z-index: 0;
  }

  /* ===== 启动页 ===== */
  #start-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(10, 0, 20, 0.75);
    cursor: pointer;
    transition: opacity 0.5s ease;
  }
  #start-screen h1 {
    font-size: 32px;
    color: #e8a0bf;
    text-shadow: 0 0 20px #e8a0bf;
    margin-bottom: 16px;
    letter-spacing: 4px;
  }
  #start-screen .start-hint {
    font-size: 15px;
    color: rgba(255,255,255,0.7);
    animation: blink 1.4s infinite;
  }
  #start-screen .start-icon {
    font-size: 64px;
    margin-bottom: 20px;
    animation: pulse 1.5s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  #start-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* ===== 桌面布局 ===== */
  #wrapper {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    padding: 20px;
    position: relative;
    z-index: 1;
  }
  #game-area { position: relative; }
  canvas { display: block; cursor: crosshair; border-radius: 0 0 12px 12px; touch-action: none; }
  .panel { display: flex; flex-direction: column; gap: 15px; width: 150px; padding-top: 10px; }
  .box {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(232,160,191,0.3);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
    color: white;
  }
  .box-label { font-size: 11px; color: #e8a0bf; letter-spacing: 1px; margin-bottom: 8px; }
  #score-val { font-size: 44px; font-weight: bold; }
  #next-img-wrap {
    width: 75px; height: 75px; border-radius: 50%;
    overflow: hidden; margin: 0 auto;
    border: 2px solid rgba(232,160,191,0.5);
  }
  #next-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .lvlist { display: flex; flex-direction: column; gap: 6px; text-align: left; }
  .lvitem { display: flex; align-items: center; gap: 8px; font-size: 11px; color: rgba(255,255,255,0.75); }
  .lvthumb { width: 22px; height: 22px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.25); }
  .lvthumb img { width: 100%; height: 100%; object-fit: cover; }

  /* ===== 手机顶栏 ===== */
  #mob-topbar {
    display: none;
    width: 100%;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    gap: 8px;
  }
  #mob-topbar .box {
    flex: 1;
    padding: 8px 10px;
  }
  #mob-score-val { font-size: 28px; font-weight: bold; }
  #mob-next-wrap {
    width: 48px; height: 48px; border-radius: 50%;
    overflow: hidden; margin: 0 auto;
    border: 2px solid rgba(232,160,191,0.5);
  }
  #mob-next-wrap img { width: 100%; height: 100%; object-fit: cover; }

  /* 手机图鉴按钮 - 列表样式 */
  #lv-btn {
    display: none;
    position: fixed;
    top: 14px; left: 14px;
    z-index: 500;
    height: 40px;
    padding: 0 14px;
    border-radius: 20px;
    background: rgba(232,160,191,0.25);
    border: 1px solid rgba(232,160,191,0.6);
    cursor: pointer;
    align-items: center;
    gap: 8px;
    color: white;
    font-size: 13px;
  }
  #lv-btn .list-icon {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #lv-btn .list-icon span {
    display: block;
    width: 18px;
    height: 2px;
    background: #e8a0bf;
    border-radius: 2px;
  }
  #lv-btn .list-label {
    color: #e8a0bf;
    font-size: 13px;
    letter-spacing: 1px;
  }

  /* 手机图鉴弹窗 */
  #lv-modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 800;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
  }
  #lv-modal.open { display: flex; }
  #lv-modal-inner {
    background: rgba(20,5,35,0.96);
    border: 1px solid rgba(232,160,191,0.4);
    border-radius: 16px;
    padding: 20px 24px;
    width: 85%;
    max-width: 320px;
    color: white;
  }
  #lv-modal-inner h3 {
    font-size: 14px;
    color: #e8a0bf;
    letter-spacing: 2px;
    margin-bottom: 14px;
    text-align: center;
  }
  #lv-modal-inner .lvlist { gap: 10px; }
  #lv-modal-inner .lvitem { font-size: 13px; }
  #lv-modal-inner .lvthumb { width: 32px; height: 32px; }
  #lv-close {
    display: block;
    margin: 18px auto 0;
    background: linear-gradient(135deg, #e8a0bf, #c050a0);
    color: white; border: none;
    padding: 10px 32px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
  }

  @media (max-width: 600px) {
    body { align-items: flex-start; overflow-y: auto; }
    #wrapper {
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 8px;
      width: 100%;
    }
    #panel-left, #panel-right { display: none; }
    #mob-topbar { display: flex; }
    #lv-btn { display: flex; }
    canvas {
      width: 100% !important;
      height: auto !important;
      border-radius: 12px;
    }
  }

  /* ===== 游戏覆盖层 ===== */
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.82);
    display: none; flex-direction: column;
    justify-content: center; align-items: center;
    border-radius: 12px; color: white; z-index: 20;
  }
  #overlay h2 { font-size: 26px; color: #e8a0bf; margin-bottom: 8px; }
  #overlay .sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
  #overlay .fscore { font-size: 56px; font-weight: bold; margin-bottom: 25px; }
  #rbtn {
    background: linear-gradient(135deg, #e8a0bf, #c050a0);
    color: white; border: none; padding: 12px 36px;
    border-radius: 25px; font-size: 16px; cursor: pointer;
  }
  #rbtn:hover { filter: brightness(1.1); }
  #music-btn {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 999;
    background: rgba(232,160,191,0.25);
    border: 1px solid rgba(232,160,191,0.5);
    color: white; border-radius: 50%;
    width: 44px; height: 44px; font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  #music-btn:hover { background: rgba(232,160,191,0.45); }
  #quote-popup {
    position: absolute; pointer-events: none;
    font-size: 22px; font-weight: bold; color: #fff;
    text-shadow: 0 0 8px #e8a0bf, 0 0 18px #e8a0bf, 2px 2px 0 #a03070;
    white-space: nowrap; opacity: 0;
    transform: translateY(0px); transition: none;
    z-index: 10; border-radius: 8px; padding: 4px 10px;
  }
</style>
</head>
<body>

<!-- 启动页 -->
<div id="start-screen" onclick="handleStart()">
  <div class="start-icon">🪵</div>
  <h1>合成凌肖</h1>
  <div class="start-hint">点击任意位置开始 ✨</div>
</div>

<audio id="bgm" src="pump.mp3" loop preload="auto"></audio>
<button id="music-btn" title="音乐开关">🎵</button>

<!-- 手机图鉴按钮 -->
<button id="lv-btn" onclick="openLvModal()" title="等级图鉴">
  <span class="list-icon">
    <span></span>
    <span></span>
    <span></span>
  </span>
  <span class="list-label">图鉴</span>
</button>

<!-- 手机图鉴弹窗 -->
<div id="lv-modal" onclick="closeLvModal()">
  <div id="lv-modal-inner" onclick="event.stopPropagation()">
    <h3>✨ 等级图鉴 ✨</h3>
    <div class="lvlist" id="lvlist-modal"></div>
    <button id="lv-close" onclick="closeLvModal()">关闭</button>
  </div>
</div>

<div id="wrapper">
  <!-- 手机顶栏 -->
  <div id="mob-topbar">
    <div class="box">
      <div class="box-label">SCORE</div>
      <div id="mob-score-val">0</div>
    </div>
    <div class="box">
      <div class="box-label">NEXT</div>
      <div id="mob-next-wrap"><img id="mob-nimg" src="" alt="next"></div>
    </div>
  </div>

  <!-- 左侧图鉴（桌面） -->
  <div class="panel" id="panel-left">
    <div class="box">
      <div class="box-label">等级图鉴</div>
      <div class="lvlist" id="lvlist"></div>
    </div>
  </div>

  <!-- 游戏主区域 -->
  <div id="game-area">
    <canvas id="c" width="400" height="620"></canvas>
    <div id="quote-popup"></div>
    <div id="overlay">
      <h2>💔 凌肖太多了！</h2>
      <div class="sub">最终得分</div>
      <div class="fscore" id="fscore">0</div>
      <button id="rbtn" onclick="restart()">再来一次 🎮</button>
    </div>
  </div>

  <!-- 右侧面板（桌面） -->
  <div class="panel" id="panel-right">
    <div class="box">
      <div class="box-label">SCORE</div>
      <div id="score-val">0</div>
    </div>
    <div class="box">
      <div class="box-label">NEXT</div>
      <div id="next-img-wrap"><img id="nimg" src="" alt="next"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
const LV = [
  { r:22,  score:1,  img:'lx1.jpg', name:'小凌肖' },
  { r:30,  score:3,  img:'lx2.jpg', name:'蛋糕凌肖' },
  { r:38,  score:6,  img:'lx3.jpg', name:'毛绒凌肖' },
  { r:48,  score:10, img:'lx4.jpg', name:'海边凌肖' },
  { r:58,  score:15, img:'lx5.jpg', name:'西瓜凌肖' },
  { r:70,  score:21, img:'lx6.jpg', name:'学院凌肖' },
  { r:82,  score:28, img:'lx7.jpg', name:'严肃凌肖' },
  { r:96,  score:36, img:'lx8.jpg', name:'雪地凌肖✨' },
];

const QUOTES = ['快跑', '城管来了', '你也太菜了吧', '呦', '无聊'];
const W = 400, H = 620;
const DROP_Y = 60;
const DANGER_Y = 55;

const IMGS = LV.map(l => { const i = new Image(); i.src = l.img; return i; });

// 生成桌面图鉴
const lvlistEl = document.getElementById('lvlist');
LV.forEach(l => {
  lvlistEl.innerHTML += `<div class="lvitem">
    <div class="lvthumb"><img src="${l.img}"></div>
    <span>${l.name}</span>
  </div>`;
});

// 生成手机弹窗图鉴
const lvlistModal = document.getElementById('lvlist-modal');
LV.forEach(l => {
  lvlistModal.innerHTML += `<div class="lvitem">
    <div class="lvthumb"><img src="${l.img}"></div>
    <span>${l.name}</span>
  </div>`;
});

function openLvModal() { document.getElementById('lv-modal').classList.add('open'); }
function closeLvModal() { document.getElementById('lv-modal').classList.remove('open'); }

// ===== Matter.js 初始化 =====
const { Engine, Render, Runner, Bodies, Body, World, Events, Mouse, MouseConstraint } = Matter;

let engine, world, balls, score, nextLv, dropping, gameOver, canDrop, merging;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function initGame() {
  if (engine) Engine.clear(engine);

  engine = Engine.create({ gravity: { y: 1.5 } });
  world = engine.world;
  balls = [];
  score = 0;
  gameOver = false;
  canDrop = true;
  dropping = null;
  merging = new Set();

  updateScore(0);

  // 墙壁
  const wallOpts = { isStatic: true, friction: 0.3, restitution: 0.3 };
  World.add(world, [
    Bodies.rectangle(W/2, H+25, W, 50, wallOpts),   // 底部
    Bodies.rectangle(-25, H/2, 50, H, wallOpts),     // 左
    Bodies.rectangle(W+25, H/2, 50, H, wallOpts),    // 右
  ]);

  nextLv = randLv();
  updateNextUI();

  // 合成事件
  Events.on(engine, 'collisionStart', handleCollision);
}

function randLv() {
  return Math.floor(Math.random() * Math.min(5, LV.length));
}

function updateScore(add) {
  score += add;
  document.getElementById('score-val').textContent = score;
  document.getElementById('mob-score-val').textContent = score;
}

function updateNextUI() {
  document.getElementById('nimg').src = LV[nextLv].img;
  document.getElementById('mob-nimg').src = LV[nextLv].img;
}

function createBall(x, y, lv, isDropping) {
  const r = LV[lv].r;
  const body = Bodies.circle(x, y, r, {
    restitution: 0.3,
    friction: 0.5,
    frictionAir: 0.01,
    density: 0.002,
    label: 'ball',
  });
  body._lv = lv;
  body._dropping = isDropping || false;
  body._id = Math.random().toString(36).slice(2);
  World.add(world, body);
  balls.push(body);
  return body;
}

function dropBall(x) {
  if (!canDrop || gameOver) return;
  canDrop = false;
  const lv = nextLv;
  const ball = createBall(x, DROP_Y, lv, true);
  dropping = ball;
  nextLv = randLv();
  updateNextUI();

  // 落地后解除 dropping 标记
  setTimeout(() => {
    if (ball) ball._dropping = false;
    dropping = null;
    canDrop = true;
  }, 800);
}

function handleCollision(event) {
  const pairs = event.pairs;
  pairs.forEach(pair => {
    const { bodyA, bodyB } = pair;
    if (bodyA.label !== 'ball' || bodyB.label !== 'ball') return;
    if (bodyA._lv !== bodyB._lv) return;
    if (merging.has(bodyA._id) || merging.has(bodyB._id)) return;
    if (bodyA._lv >= LV.length - 1) return;

    merging.add(bodyA._id);
    merging.add(bodyB._id);

    const nx = (bodyA.position.x + bodyB.position.x) / 2;
    const ny = (bodyA.position.y + bodyB.position.y) / 2;
    const newLv = bodyA._lv + 1;

    setTimeout(() => {
      removeBall(bodyA);
      removeBall(bodyB);
      const nb = createBall(nx, ny, newLv, false);
      updateScore(LV[newLv].score);
      showQuote(nx, ny);
      merging.delete(bodyA._id);
      merging.delete(bodyB._id);
    }, 50);
  });
}

function removeBall(body) {
  World.remove(world, body);
  balls = balls.filter(b => b !== body);
}

function showQuote(x, y) {
  const el = document.getElementById('quote-popup');
  el.textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  el.style.left = (x - 40) + 'px';
  el.style.top = (y - 30) + 'px';
  el.style.opacity = '1';
  el.style.transform = 'translateY(0)';
  el.style.transition = 'none';
  setTimeout(() => {
    el.style.transition = 'opacity 0.6s, transform 0.6s';
    el.style.opacity = '0';
    el.style.transform = 'translateY(-30px)';
  }, 50);
}

// ===== 渲染循环 =====
let cursorX = W / 2;
let aimLine = true;

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  cursorX = Math.max(LV[nextLv].r, Math.min(W - LV[nextLv].r, (e.clientX - rect.left) * scaleX));
});

canvas.addEventListener('click', e => {
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const x = Math.max(LV[nextLv].r, Math.min(W - LV[nextLv].r, (e.clientX - rect.left) * scaleX));
  dropBall(x);
});

// 触摸
let touchX = W / 2;
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  touchX = Math.max(LV[nextLv].r, Math.min(W - LV[nextLv].r, (e.touches[0].clientX - rect.left) * scaleX));
  cursorX = touchX;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (gameOver) return;
  dropBall(touchX);
});

function drawGame() {
  ctx.clearRect(0, 0, W, H);

  // 背景
  ctx.fillStyle = 'rgba(15, 5, 30, 0.92)';
  ctx.fillRect(0, 0, W, H);

  // 危险线
  ctx.strokeStyle = 'rgba(232, 100, 150, 0.6)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(0, DANGER_Y + 10);
  ctx.lineTo(W, DANGER_Y + 10);
  ctx.stroke();
  ctx.setLineDash([]);

  // 准星线
  if (canDrop && !gameOver) {
    ctx.strokeStyle = 'rgba(232,160,191,0.35)';
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(cursorX, DROP_Y);
    ctx.lineTo(cursorX, H);
    ctx.stroke();
    ctx.setLineDash([]);

    // 预览球
    const pr = LV[nextLv].r;
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.beginPath();
    ctx.arc(cursorX, DROP_Y, pr, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(IMGS[nextLv], cursorX - pr, DROP_Y - pr, pr * 2, pr * 2);
    ctx.restore();
  }

  // 画球
  balls.forEach(b => {
    const r = b.circleRadius;
    const { x, y } = b.position;
    const angle = b.angle;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(IMGS[b._lv], -r, -r, r * 2, r * 2);
    ctx.restore();
  });
}

// ★★★ 死亡判定：只判断非 dropping 的静止球 ★★★
function checkGameOver() {
  if (gameOver) return;
  for (const b of balls) {
    if (b._dropping) continue; // 正在下落的球不算
    if (b.position.y - b.circleRadius < DANGER_Y) {
      triggerGameOver();
      return;
    }
  }
}

function triggerGameOver() {
  gameOver = true;
  document.getElementById('fscore').textContent = score;
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
}

function restart() {
  document.getElementById('overlay').style.display = 'none';
  initGame();
}

// ===== 音乐控制 =====
const bgm = document.getElementById('bgm');
let musicOn = false;
document.getElementById('music-btn').addEventListener('click', () => {
  if (musicOn) {
    bgm.pause();
    musicOn = false;
    document.getElementById('music-btn').textContent = '🔇';
  } else {
    bgm.play().catch(() => {});
    musicOn = true;
    document.getElementById('music-btn').textContent = '🎵';
  }
});

// ===== 启动页 =====
function handleStart() {
  const ss = document.getElementById('start-screen');
  ss.classList.add('hidden');
  bgm.play().then(() => { musicOn = true; }).catch(() => {});
  setTimeout(() => { ss.style.display = 'none'; }, 500);
}

// ===== 主循环 =====
let lastTime = 0;
function loop(ts) {
  const delta = ts - lastTime;
  lastTime = ts;
  Engine.update(engine, delta || 16);
  drawGame();
  checkGameOver();
  requestAnimationFrame(loop);
}

initGame();
requestAnimationFrame(loop);
</script>
</body>
</html>
